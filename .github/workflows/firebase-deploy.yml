name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Firebase Storage bucket exists
        id: ensure-bucket
        continue-on-error: true
        run: |
          set -euo pipefail
          BUCKET="che-facim.firebasestorage.app"
          PROJECT="che-facim"
          if gcloud storage buckets describe "gs://${BUCKET}" --project "${PROJECT}" >/dev/null 2>&1; then
            echo "Bucket gs://${BUCKET} già presente."
            echo "bucket_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Bucket gs://${BUCKET} assente — tentativo creazione europe-west1..."
            if gcloud storage buckets create "gs://${BUCKET}" \
              --project="${PROJECT}" \
              --location=europe-west1 \
              --uniform-bucket-level-access; then
              echo "Bucket creato."
              echo "bucket_ok=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Impossibile creare il bucket. Abilita Storage in Firebase Console → Build → Storage → Inizia."
              echo "bucket_ok=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Verify Storage bucket (Admin SDK)
        if: steps.ensure-bucket.outputs.bucket_ok == 'true'
        run: |
          npm install @google-cloud/storage@7 --no-save
          node scripts/verify-storage-bucket.mjs

      - name: Deploy to Firebase Hosting
        run: |
          set +e
          output=$(npx firebase-tools@15.22.3 deploy \
            --only hosting \
            --project che-facim \
            --non-interactive 2>&1)
          code=$?
          echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -q "is the current active version"; then
            echo "Hosting già aggiornato (versione già live) — deploy considerato riuscito."
            exit 0
          fi
          exit $code

      - name: Deploy Firestore rules and indexes
        run: |
          npx firebase-tools@15.22.3 deploy \
            --only firestore:rules,firestore:indexes \
            --project che-facim \
            --non-interactive

      - name: Deploy Storage rules
        id: deploy-storage
        run: |
          set -euo pipefail
          npx firebase-tools@15.22.3 deploy \
            --only storage \
            --project che-facim \
            --non-interactive
          echo "storage_deployed=true" >> "$GITHUB_OUTPUT"

      - name: Verify Storage bucket pubblico
        if: steps.ensure-bucket.outputs.bucket_ok == 'true'
        run: node scripts/verify-storage-ready.mjs

      - name: Storage non configurato
        if: steps.ensure-bucket.outputs.bucket_ok != 'true'
        run: |
          echo "::error::Firebase Storage non attivo: upload copertine admin fallirà finché non abiliti Storage in Console (Build → Storage → Inizia) sul progetto che-facim."
