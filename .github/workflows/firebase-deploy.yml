name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: |
          set +e
          output=$(npx firebase-tools@15.22.3 deploy \
            --only hosting \
            --project che-facim \
            --non-interactive 2>&1)
          code=$?
          echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -q "is the current active version"; then
            echo "Hosting già aggiornato (versione già live) — deploy considerato riuscito."
            exit 0
          fi
          exit $code

      - name: Deploy Firestore rules and indexes
        run: |
          npx firebase-tools@15.22.3 deploy \
            --only firestore:rules,firestore:indexes \
            --project che-facim \
            --non-interactive

      - name: Deploy Storage rules
        continue-on-error: true
        run: |
          set +e
          output=$(npx firebase-tools@15.22.3 deploy \
            --only storage \
            --project che-facim \
            --non-interactive 2>&1)
          code=$?
          echo "$output"
          if [ $code -ne 0 ]; then
            echo "::warning::Deploy Storage fallito. Abilita Firebase Storage nella console GCP se non ancora attivo."
          fi
          exit 0
