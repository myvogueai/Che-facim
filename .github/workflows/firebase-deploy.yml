name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: |
          set +e
          output=$(npx firebase-tools@15.22.3 deploy \
            --only hosting \
            --project che-facim \
            --non-interactive 2>&1)
          code=$?
          echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -q "is the current active version"; then
            echo "Hosting già aggiornato (versione già live) — deploy considerato riuscito."
            exit 0
          fi
          exit $code

      - name: Deploy Firestore rules and indexes
        run: |
          npx firebase-tools@15.22.3 deploy \
            --only firestore:rules,firestore:indexes \
            --project che-facim \
            --non-interactive

      - name: Deploy Storage rules
        id: deploy-storage
        continue-on-error: true
        run: |
          set +e
          output=$(npx firebase-tools@15.22.3 deploy \
            --only storage \
            --project che-facim \
            --non-interactive 2>&1)
          code=$?
          echo "$output"
          if [ $code -eq 0 ]; then
            echo "storage_deployed=true" >> "$GITHUB_OUTPUT"
          elif echo "$output" | grep -qE "already exists|rules file.*compiled successfully"; then
            echo "storage_deployed=true" >> "$GITHUB_OUTPUT"
            echo "Storage rules già pubblicate o aggiornate (409/duplicato considerato OK)."
          else
            echo "storage_deployed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Storage rules non pubblicate. Verifica Firebase Console → Storage."
          fi
          exit 0

      - name: Verifica deploy Storage
        if: steps.deploy-storage.outputs.storage_deployed != 'true'
        run: |
          echo "::warning::Upload copertine admin non attivo finché Storage non è configurato e le rules non sono deployate."
