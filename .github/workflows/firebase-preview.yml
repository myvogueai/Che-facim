name: Deploy Preview Channel (Fase 1)

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Nome del preview channel (es. fase1-auth)"
        required: false
        default: "fase1-auth"
        type: string
      deploy_rules:
        description: "Deploy anche le Firestore rules (necessario per la registrazione)"
        required: false
        default: true
        type: boolean
  push:
    branches:
      - cursor/auth-fase-1-fondamenta-2423

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest

    env:
      CHANNEL_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.channel_id || 'fase1-auth' }}
      DEPLOY_RULES: ${{ github.event_name == 'push' && 'true' || format('{0}', inputs.deploy_rules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Hosting Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: che-facim
          channelId: ${{ env.CHANNEL_ID }}
          expires: 7d

      - name: Authenticate with Google Cloud
        if: env.DEPLOY_RULES == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules
        if: env.DEPLOY_RULES == 'true'
        run: |
          npx firebase-tools@15.22.3 deploy \
            --only firestore:rules \
            --project che-facim \
            --non-interactive

      - name: Preview URL summary
        run: |
          PREVIEW_URL="https://${{ env.CHANNEL_ID }}--che-facim.web.app"
          echo "## Preview Channel deployato" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Login:** ${PREVIEW_URL}/auth/login.html" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Registrazione:** ${PREVIEW_URL}/auth/register.html" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Produzione non modificata: https://che-facim.web.app" >> "$GITHUB_STEP_SUMMARY"
