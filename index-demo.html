<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Che facim'? — Eventi in provincia di Potenza</title>
<link rel="icon" href="assets/img/logo-header.png" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css" />
<style>
  #mappa-wrap { position: relative; }
  .leaflet-container { background: var(--superficie) !important; }
  .leaflet-control-attribution { background: rgba(22,19,32,0.7) !important; color: var(--lavanda) !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: var(--lavanda) !important; }
</style>
</head>
<body>

  <header class="app-header">
    <div class="header-riga">
      <img src="assets/img/logo-header.png" alt="Che facim'?" class="logo-app" />
      <div>
        <h1>Che facim'?</h1>
        <p class="sotto-titolo" id="contatore-eventi">Caricamento eventi…</p>
      </div>
    </div>
  </header>

  <div class="giorni-scroll" id="giorni-scroll"></div>

  <div class="filtri-bar">
    <button class="filtri-bottone" id="bottone-filtra">
      Filtra per categoria
    </button>
  </div>

  <div id="mappa-wrap">
    <button class="cerca-zona-bottone" id="bottone-cerca-zona" style="display:none;">Cerca in questa zona</button>
    <div id="mappa"></div>
  </div>

  <div class="lista-eventi" id="lista-eventi">
    <p class="stato-vuoto">Caricamento…</p>
  </div>

  <nav class="nav-inferiore">
    <a class="nav-voce attiva" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Esplora
    </a>
    <a class="nav-voce" href="preferiti.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      Preferiti
    </a>
    <a class="nav-voce" href="i-miei-eventi.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      I miei eventi
    </a>
    <a class="nav-voce" href="about.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      About
    </a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    // ===== VERSIONE DEMO — dati finti, nessuna connessione Firebase =====
    const EVENTI_DEMO = [
      {
        id: 'demo1', titolo: 'Sagra del Peperone Crusco', sottotitolo: 'Stand gastronomici e musica popolare',
        locale: 'Piazza Garibaldi', comune: 'Senise', lat: 40.1517, lng: 16.2872,
        categoria: 'sagra', prezzo: 'Gratis', orario: '20:00',
        immagine_url: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&q=80',
        oggi: true
      },
      {
        id: 'demo2', titolo: 'Notte di San Lorenzo Live', sottotitolo: 'Concerto acustico sotto le stelle',
        locale: 'Belvedere Castello', comune: 'Melfi', lat: 41.0036, lng: 15.6553,
        categoria: 'musica', prezzo: '10€', orario: '21:30',
        immagine_url: 'https://images.unsplash.com/photo-1493676304819-0d7a8d026dcf?w=400&q=80',
        oggi: true
      },
      {
        id: 'demo3', titolo: 'Notte Bianca Lucana', sottotitolo: 'DJ set + apertura straordinaria negozi',
        locale: 'Centro storico', comune: 'Potenza', lat: 40.6404, lng: 15.8056,
        categoria: 'nightlife', prezzo: 'Gratis', orario: '22:00',
        immagine_url: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&q=80',
        oggi: true
      },
      {
        id: 'demo4', titolo: 'Edipo Re', sottotitolo: 'Compagnia teatrale lucana',
        locale: 'Teatro Stabile', comune: 'Potenza', lat: 40.6420, lng: 15.8070,
        categoria: 'teatro', prezzo: '8€', orario: '19:30',
        immagine_url: 'https://images.unsplash.com/photo-1503095396549-807759245b35?w=400&q=80',
        oggi: true
      },
      {
        id: 'demo5', titolo: 'Torneo di Calcetto 5vs5', sottotitolo: 'Fase finale del torneo estivo',
        locale: 'Centro Sportivo Comunale', comune: 'Lauria', lat: 40.0486, lng: 15.8378,
        categoria: 'sport', prezzo: 'Gratis', orario: '18:00',
        immagine_url: 'https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=400&q=80',
        oggi: true
      }
    ];

    const CATEGORIE_LABEL = {
      musica: 'Musica live', sagra: 'Sagra / Festa paesana', nightlife: 'Discoteca / Nightlife',
      teatro: 'Teatro / Cultura', sport: 'Sport', altro: 'Evento'
    };

    // ---- Costruzione selettore giorni ----
    const NOMI_GIORNI = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
    const contenitoreGiorni = document.getElementById('giorni-scroll');
    let giornoSelezionato = new Date(); giornoSelezionato.setHours(0,0,0,0);
    const giorni = [];
    for (let i = 0; i < 14; i++) {
      const g = new Date(); g.setDate(g.getDate() + i); g.setHours(0,0,0,0);
      giorni.push(g);
    }
    function renderGiorni() {
      contenitoreGiorni.innerHTML = '';
      giorni.forEach(g => {
        const attivo = g.getTime() === giornoSelezionato.getTime();
        const pill = document.createElement('button');
        pill.className = 'giorno-pill' + (attivo ? ' attivo' : '');
        pill.innerHTML = `<span class="num">${g.getDate()}</span><span class="label">${NOMI_GIORNI[g.getDay()]}</span>`;
        pill.addEventListener('click', () => { giornoSelezionato = g; renderGiorni(); aggiornaVista(); });
        contenitoreGiorni.appendChild(pill);
      });
    }
    renderGiorni();

    // ---- Mappa ----
    const CENTRO_POTENZA = [40.55, 15.85];
    const mappa = L.map('mappa', { zoomControl: false }).setView(CENTRO_POTENZA, 9);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap, © CARTO', maxZoom: 19
    }).addTo(mappa);

    let marcatori = [];
    function pinIcona(attivo) {
      return L.divIcon({ className: '', html: `<div class="pin-fuoco${attivo ? ' attivo' : ''}"></div>`, iconSize: [18,18], iconAnchor: [9,9] });
    }
    function disegnaMarcatori(eventi) {
      marcatori.forEach(m => mappa.removeLayer(m));
      marcatori = [];
      eventi.forEach(ev => {
        const marker = L.marker([ev.lat, ev.lng], { icon: pinIcona(false) }).addTo(mappa)
          .on('click', () => document.getElementById('card-' + ev.id)?.scrollIntoView({ behavior:'smooth', block:'center' }));
        marcatori.push(marker);
      });
    }

    const listaEl = document.getElementById('lista-eventi');
    const contatoreEl = document.getElementById('contatore-eventi');
    const ICONE_META = {
      orologio: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
      pin: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-7.5 7-12a7 7 0 1 0-14 0c0 4.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>',
      euro: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 7a5 5 0 0 0-8 4 5 5 0 0 0 8 4M5 10h7M5 14h6"/></svg>'
    };

    function renderEventi(eventi) {
      if (eventi.length === 0) {
        listaEl.innerHTML = `<p class="stato-vuoto">Nessun evento demo per questo giorno.<br>Torna al 30 giugno per vedere tutti gli esempi.</p>`;
        contatoreEl.textContent = 'Nessun evento';
        return;
      }
      contatoreEl.textContent = `${eventi.length} eventi trovati · DEMO`;
      listaEl.innerHTML = eventi.map(ev => {
        const gratis = ev.prezzo.toLowerCase().includes('gratis');
        return `
        <a class="evento-card cat-${ev.categoria}" id="card-${ev.id}" href="#">
          <img class="locandina" src="${ev.immagine_url}" alt="" loading="lazy" />
          <div class="corpo">
            <div class="titolo">${ev.titolo}</div>
            <div class="sottotitolo">${ev.sottotitolo}</div>
            <div class="locale">${ev.locale}</div>
            <div class="meta-riga">
              <span>${ICONE_META.orologio} ${ev.orario}</span>
              <span>${ICONE_META.pin} ${ev.comune}</span>
            </div>
            <div class="prezzo-riga${gratis ? ' gratis' : ''}">${ICONE_META.euro} ${ev.prezzo}</div>
          </div>
        </a>`;
      }).join('');
    }

    function aggiornaVista() {
      // In demo mostriamo sempre gli stessi eventi solo per il "giorno selezionato" iniziale (oggi)
      const eventi = giornoSelezionato.getTime() === giorni[0].getTime() ? EVENTI_DEMO : [];
      renderEventi(eventi);
      disegnaMarcatori(eventi);
      if (eventi.length > 0) {
        const bounds = L.latLngBounds(eventi.map(e => [e.lat, e.lng]));
        mappa.fitBounds(bounds, { padding: [40,40], maxZoom: 11 });
      }
    }
    aggiornaVista();
  </script>
</body>
</html>
