<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Admin — Che facim'?</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css?v=6" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>

  <!-- ====== SCHERMATA LOGIN ====== -->
  <div id="vista-login" style="padding: 80px 24px;">
    <h1 style="font-family: var(--font-display); font-size: 26px; margin-bottom: 6px;">Accesso admin</h1>
    <p class="sotto-titolo" style="margin-bottom: 28px;">Solo per chi gestisce Che facim'?</p>
    <form id="form-login" class="admin-form" style="padding: 0;">
      <div class="campo">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="username" />
      </div>
      <div class="campo">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="bottone-primario" id="bottone-login">Accedi</button>
      <p id="login-errore" style="color: var(--terracotta); font-size: 13.5px; display:none;"></p>
    </form>
  </div>

  <!-- ====== CONTENUTO ADMIN (visibile solo dopo login) ====== -->
  <div id="vista-admin" style="display:none;">

  <header class="app-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
    <div class="header-riga">
      <img src="../assets/img/logo-header.png" alt="Che facim'?" class="logo-app" style="width:42px; height:42px;" />
      <div>
        <h1>Admin eventi</h1>
        <p class="sotto-titolo">Inserisci, modifica o elimina eventi</p>
      </div>
    </div>
    <button id="bottone-logout" style="font-size:13px; color: var(--lavanda); padding: 8px 12px; background: var(--superficie); border-radius: 10px;">Esci</button>
  </header>

  <div style="display:flex; gap:10px; padding: 0 20px 16px;">
    <button class="filtri-bottone" id="tab-nuovo" style="background: var(--terracotta); color:#fff;">+ Nuovo evento</button>
    <button class="filtri-bottone" id="tab-lista">Lista eventi</button>
  </div>

  <!-- ====== FORM NUOVO/MODIFICA EVENTO ====== -->
  <form class="admin-form" id="form-evento">
    <input type="hidden" id="evento-id" />

    <div class="campo">
      <label for="titolo">Titolo evento *</label>
      <input type="text" id="titolo" required placeholder="es. Sagra del Peperone Crusco" />
    </div>

    <div class="campo">
      <label for="sottotitolo">Sottotitolo (artista, DJ, occasione)</label>
      <input type="text" id="sottotitolo" placeholder="es. Orchestra spettacolo Pino Daniele" />
    </div>

    <section class="posizione-sezione" aria-labelledby="posizione-titolo">
      <h2 class="posizione-sezione-titolo" id="posizione-titolo">Posizione del locale</h2>

      <div class="campo">
        <label for="locale">Nome locale *</label>
        <input type="text" id="locale" required placeholder="es. Teatro Verdi, Bar Centrale" />
      </div>

      <div class="campo posizione-autocomplete">
        <label for="indirizzo">Via / indirizzo *</label>
        <input type="text" id="indirizzo" required autocomplete="off" placeholder="Via del Basento, Potenza" role="combobox" aria-expanded="false" aria-controls="indirizzo-suggerimenti" />
        <ul id="indirizzo-suggerimenti" class="suggerimenti-lista" role="listbox" hidden></ul>
      </div>

      <div class="campo-riga">
        <div class="campo campo-civico">
          <label for="civico">Numero civico</label>
          <input type="text" id="civico" inputmode="numeric" autocomplete="off" placeholder="es. 11" />
        </div>
        <div class="campo">
          <label for="comune">Comune *</label>
          <input type="text" id="comune" required placeholder="Compilato automaticamente" />
        </div>
      </div>

      <input type="hidden" id="lat" />
      <input type="hidden" id="lng" />

      <div class="posizione-mappa-riga">
        <div class="mini-mappa-shell">
          <div id="mini-mappa" class="mini-mappa" aria-label="Anteprima posizione sulla mappa"></div>
        </div>
        <div id="posizione-stato" class="posizione-stato posizione-stato--vuoto" aria-live="polite">
          <span class="posizione-stato-icona">⚠️</span> Inserisci un indirizzo per trovare la posizione
        </div>
      </div>
    </section>

    <div class="campo-riga">
      <div class="campo">
        <label for="data">Data *</label>
        <input type="date" id="data" required />
      </div>
      <div class="campo">
        <label for="orario">Orario *</label>
        <input type="time" id="orario" required />
      </div>
    </div>

    <div class="campo-riga">
      <div class="campo">
        <label for="categoria">Categoria *</label>
        <select id="categoria" required>
          <option value="musica">Musica live</option>
          <option value="sagra">Sagra / Festa paesana</option>
          <option value="nightlife">Discoteca / Nightlife</option>
          <option value="teatro">Teatro / Cultura</option>
          <option value="sport">Sport</option>
          <option value="altro">Altro</option>
        </select>
      </div>
      <div class="campo">
        <label for="prezzo">Prezzo</label>
        <input type="text" id="prezzo" placeholder="Gratis / 10€ / A pagamento" value="Gratis" />
      </div>
    </div>

    <div class="campo campo-copertina">
      <label>Copertina evento</label>
      <input type="hidden" id="immagine_url" />
      <input
        type="file"
        id="copertina-file"
        accept="image/jpeg,image/png,image/webp"
        hidden
      />
      <div class="copertina-admin">
        <div class="copertina-preview-wrap" id="copertina-preview-wrap" hidden>
          <img class="copertina-preview" id="copertina-preview" alt="Anteprima copertina evento" />
          <div class="copertina-azioni">
            <button type="button" class="filtri-bottone" id="copertina-sostituisci">Sostituisci</button>
            <button type="button" class="filtri-bottone copertina-rimuovi" id="copertina-rimuovi">Rimuovi</button>
          </div>
        </div>
        <button type="button" class="filtri-bottone" id="copertina-seleziona">Seleziona immagine</button>
        <p class="copertina-hint">JPG, JPEG, PNG o WEBP · massimo 5 MB</p>
        <p class="copertina-errore" id="copertina-errore" hidden></p>
      </div>
    </div>

    <div class="campo">
      <label for="descrizione">Descrizione</label>
      <textarea id="descrizione" placeholder="Dettagli evento, programma, info..."></textarea>
    </div>

    <div class="campo">
      <label for="contatti">Contatti organizzatore</label>
      <input type="text" id="contatti" placeholder="Tel / WhatsApp / email" />
    </div>

    <div class="campo-riga" style="align-items:center;">
      <label style="display:flex; align-items:center; gap:8px; font-size:14px; color: var(--pietra);">
        <input type="checkbox" id="in_evidenza" style="width:auto;" />
        In evidenza (promo a pagamento)
      </label>
    </div>

    <button type="submit" class="bottone-primario" id="bottone-salva">Pubblica evento</button>
    <button type="button" class="filtri-bottone" id="bottone-annulla-modifica" style="display:none;">Annulla modifica</button>
  </form>

  <!-- ====== LISTA EVENTI (ADMIN) ====== -->
  <div style="padding: 0 20px 100px; display:none;" id="vista-lista">
    <div id="lista-admin"></div>
  </div>

  </div> <!-- fine vista-admin -->

  <script type="module">
    import { creaEvento, aggiornaEvento, eliminaEvento, getTuttiEventiAdmin } from '../assets/eventi-data.js';
    import {
      validaImmagineEvento,
      caricaCopertinaEvento,
      eliminaCopertinaDaUrl,
      isUrlStorageCopertina,
    } from '../assets/eventi-storage.js';
    import { LocationPicker } from '../assets/location/location-picker.js?v=6';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const auth = getAuth();
    const vistaLogin = document.getElementById('vista-login');
    const vistaAdmin = document.getElementById('vista-admin');
    const formLogin = document.getElementById('form-login');
    const loginErrore = document.getElementById('login-errore');
    const bottoneLogin = document.getElementById('bottone-login');

    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      bottoneLogin.disabled = true;
      bottoneLogin.textContent = 'Accesso…';
      loginErrore.style.display = 'none';
      try {
        await signInWithEmailAndPassword(
          auth,
          document.getElementById('login-email').value.trim(),
          document.getElementById('login-password').value
        );
      } catch (err) {
        loginErrore.textContent = 'Email o password non corrette.';
        loginErrore.style.display = 'block';
      } finally {
        bottoneLogin.disabled = false;
        bottoneLogin.textContent = 'Accedi';
      }
    });

    document.getElementById('bottone-logout').addEventListener('click', () => signOut(auth));

    const formEl = document.getElementById('form-evento');
    const vistaListaEl = document.getElementById('vista-lista');
    const tabNuovo = document.getElementById('tab-nuovo');
    const tabLista = document.getElementById('tab-lista');
    const bottoneSalva = document.getElementById('bottone-salva');
    const bottoneAnnulla = document.getElementById('bottone-annulla-modifica');

    const copertinaFileEl = document.getElementById('copertina-file');
    const copertinaPreviewWrap = document.getElementById('copertina-preview-wrap');
    const copertinaPreview = document.getElementById('copertina-preview');
    const copertinaSeleziona = document.getElementById('copertina-seleziona');
    const copertinaSostituisci = document.getElementById('copertina-sostituisci');
    const copertinaRimuovi = document.getElementById('copertina-rimuovi');
    const copertinaErrore = document.getElementById('copertina-errore');
    const immagineUrlEl = document.getElementById('immagine_url');

    let fileCopertinaPendente = null;
    let copertinaRimossa = false;
    let anteprimaLocaleUrl = null;

    function mostraErroreCopertina(msg) {
      if (!msg) {
        copertinaErrore.hidden = true;
        copertinaErrore.textContent = '';
        return;
      }
      copertinaErrore.hidden = false;
      copertinaErrore.textContent = msg;
    }

    function revocaAnteprimaLocale() {
      if (anteprimaLocaleUrl) {
        URL.revokeObjectURL(anteprimaLocaleUrl);
        anteprimaLocaleUrl = null;
      }
    }

    function aggiornaUiCopertina(url = '') {
      revocaAnteprimaLocale();
      immagineUrlEl.value = url || '';

      if (url) {
        copertinaPreview.src = url;
        copertinaPreviewWrap.hidden = false;
        copertinaSeleziona.hidden = true;
      } else {
        copertinaPreview.removeAttribute('src');
        copertinaPreviewWrap.hidden = true;
        copertinaSeleziona.hidden = false;
      }
    }

    function resetCopertina() {
      fileCopertinaPendente = null;
      copertinaRimossa = false;
      copertinaFileEl.value = '';
      mostraErroreCopertina('');
      aggiornaUiCopertina('');
    }

    function impostaCopertinaEsistente(url) {
      fileCopertinaPendente = null;
      copertinaRimossa = false;
      copertinaFileEl.value = '';
      mostraErroreCopertina('');
      aggiornaUiCopertina(url || '');
    }

    copertinaSeleziona.addEventListener('click', () => copertinaFileEl.click());
    copertinaSostituisci.addEventListener('click', () => copertinaFileEl.click());

    copertinaRimuovi.addEventListener('click', () => {
      fileCopertinaPendente = null;
      copertinaRimossa = true;
      copertinaFileEl.value = '';
      mostraErroreCopertina('');
      aggiornaUiCopertina('');
    });

    copertinaFileEl.addEventListener('change', () => {
      const file = copertinaFileEl.files?.[0];
      if (!file) return;

      const validazione = validaImmagineEvento(file);
      if (!validazione.valido) {
        mostraErroreCopertina(validazione.messaggio);
        copertinaFileEl.value = '';
        return;
      }

      mostraErroreCopertina('');
      fileCopertinaPendente = file;
      copertinaRimossa = false;
      revocaAnteprimaLocale();
      anteprimaLocaleUrl = URL.createObjectURL(file);
      copertinaPreview.src = anteprimaLocaleUrl;
      copertinaPreviewWrap.hidden = false;
      copertinaSeleziona.hidden = true;
    });

    async function gestisciCopertinaEvento(eventoId, urlEsistente) {
      if (copertinaRimossa && urlEsistente) {
        await eliminaCopertinaDaUrl(urlEsistente);
        return '';
      }

      if (!fileCopertinaPendente) {
        return urlEsistente || '';
      }

      const nuovoUrl = await caricaCopertinaEvento(fileCopertinaPendente, eventoId);
      if (urlEsistente && urlEsistente !== nuovoUrl && isUrlStorageCopertina(urlEsistente)) {
        await eliminaCopertinaDaUrl(urlEsistente);
      }
      return nuovoUrl;
    }

    const locationPicker = new LocationPicker({
      localeEl: document.getElementById('locale'),
      indirizzoEl: document.getElementById('indirizzo'),
      civicoEl: document.getElementById('civico'),
      comuneEl: document.getElementById('comune'),
      latEl: document.getElementById('lat'),
      lngEl: document.getElementById('lng'),
      suggerimentiEl: document.getElementById('indirizzo-suggerimenti'),
      mappaEl: document.getElementById('mini-mappa'),
      statoEl: document.getElementById('posizione-stato'),
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        vistaLogin.style.display = 'none';
        vistaAdmin.style.display = 'block';
        requestAnimationFrame(() => locationPicker.invalidateSize());
      } else {
        vistaLogin.style.display = 'block';
        vistaAdmin.style.display = 'none';
      }
    });

    function mostraToast(msg, errore = false) {
      const t = document.createElement('div');
      t.className = 'toast' + (errore ? ' errore' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }

    function mostraTab(nome) {
      if (nome === 'nuovo') {
        formEl.style.display = 'flex';
        vistaListaEl.style.display = 'none';
        tabNuovo.style.background = 'var(--terracotta)';
        tabNuovo.style.color = '#fff';
        tabLista.style.background = 'var(--superficie)';
        tabLista.style.color = 'var(--lavanda)';
        locationPicker.invalidateSize();
      } else {
        formEl.style.display = 'none';
        vistaListaEl.style.display = 'block';
        tabLista.style.background = 'var(--terracotta)';
        tabLista.style.color = '#fff';
        tabNuovo.style.background = 'var(--superficie)';
        tabNuovo.style.color = 'var(--lavanda)';
        caricaListaAdmin();
      }
    }
    tabNuovo.addEventListener('click', () => mostraTab('nuovo'));
    tabLista.addEventListener('click', () => mostraTab('lista'));

    function resetForm() {
      formEl.reset();
      document.getElementById('evento-id').value = '';
      document.getElementById('prezzo').value = 'Gratis';
      locationPicker.reset();
      resetCopertina();
      bottoneSalva.textContent = 'Pubblica evento';
      bottoneAnnulla.style.display = 'none';
    }

    bottoneAnnulla.addEventListener('click', resetForm);

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();

      const validazionePosizione = locationPicker.valida();
      if (!validazionePosizione.valido) {
        mostraToast(validazionePosizione.messaggio, true);
        document.getElementById('indirizzo').focus();
        return;
      }

      bottoneSalva.disabled = true;
      bottoneSalva.textContent = 'Salvataggio…';

      const id = document.getElementById('evento-id').value;
      const dataVal = document.getElementById('data').value;
      const orarioVal = document.getElementById('orario').value;
      const posizione = locationPicker.getDati();
      const urlCopertinaEsistente = immagineUrlEl.value.trim();

      const dati = {
        titolo: document.getElementById('titolo').value.trim(),
        sottotitolo: document.getElementById('sottotitolo').value.trim(),
        locale: posizione.locale,
        indirizzo: posizione.indirizzo,
        civico: posizione.civico,
        comune: posizione.comune,
        lat: posizione.lat,
        lng: posizione.lng,
        dataIso: `${dataVal}T${orarioVal}:00`,
        orario: orarioVal,
        categoria: document.getElementById('categoria').value,
        prezzo: document.getElementById('prezzo').value.trim() || 'Gratis',
        immagine_url: urlCopertinaEsistente,
        descrizione: document.getElementById('descrizione').value.trim(),
        contatti: document.getElementById('contatti').value.trim(),
        in_evidenza: document.getElementById('in_evidenza').checked,
        stato: 'pubblicato'
      };

      try {
        if (id) {
          await aggiornaEvento(id, dati);
          const immagineFinale = await gestisciCopertinaEvento(id, urlCopertinaEsistente);
          if (immagineFinale !== urlCopertinaEsistente) {
            await aggiornaEvento(id, { immagine_url: immagineFinale });
          }
          mostraToast('Evento aggiornato ✓');
        } else {
          dati.immagine_url = '';
          const ref = await creaEvento(dati);
          const immagineFinale = await gestisciCopertinaEvento(ref.id, '');
          if (immagineFinale) {
            await aggiornaEvento(ref.id, { immagine_url: immagineFinale });
          }
          mostraToast('Evento pubblicato ✓');
        }
        resetForm();
      } catch (err) {
        console.error(err);
        mostraToast('Errore: ' + err.message, true);
      } finally {
        bottoneSalva.disabled = false;
        bottoneSalva.textContent = id ? 'Salva modifiche' : 'Pubblica evento';
      }
    });

    async function caricaListaAdmin() {
      const listaAdminEl = document.getElementById('lista-admin');
      listaAdminEl.innerHTML = '<p class="stato-vuoto">Caricamento…</p>';
      try {
        const eventi = await getTuttiEventiAdmin();
        if (eventi.length === 0) {
          listaAdminEl.innerHTML = '<p class="stato-vuoto">Nessun evento ancora inserito.</p>';
          return;
        }
        listaAdminEl.innerHTML = eventi.map(ev => {
          const d = ev.data?.toDate ? ev.data.toDate() : new Date(ev.data);
          const dataFmt = d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
          return `
          <div class="admin-lista-item">
            <div class="info">
              <div class="t">${ev.titolo}</div>
              <div class="d">${dataFmt} · ${ev.comune} · ${ev.stato}</div>
            </div>
            <div class="azioni">
              <button data-modifica="${ev.id}">Modifica</button>
              <button class="elimina" data-elimina="${ev.id}">Elimina</button>
            </div>
          </div>`;
        }).join('');

        listaAdminEl.querySelectorAll('[data-elimina]').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Eliminare definitivamente questo evento?')) return;
            try {
              await eliminaEvento(btn.dataset.elimina);
              mostraToast('Evento eliminato');
              caricaListaAdmin();
            } catch (err) {
              mostraToast('Errore eliminazione', true);
            }
          });
        });

        listaAdminEl.querySelectorAll('[data-modifica]').forEach(btn => {
          btn.addEventListener('click', () => {
            const ev = eventi.find(e => e.id === btn.dataset.modifica);
            if (!ev) return;
            const d = ev.data?.toDate ? ev.data.toDate() : new Date(ev.data);

            document.getElementById('evento-id').value = ev.id;
            document.getElementById('titolo').value = ev.titolo || '';
            document.getElementById('sottotitolo').value = ev.sottotitolo || '';
            locationPicker.caricaPosizione({
              locale: ev.locale || '',
              indirizzo: ev.indirizzo || (ev.locale && ev.comune ? `${ev.locale}, ${ev.comune}` : ''),
              civico: ev.civico || '',
              comune: ev.comune || '',
              lat: ev.lat,
              lng: ev.lng,
            });
            document.getElementById('data').value = d.toISOString().slice(0,10);
            document.getElementById('orario').value = ev.orario || d.toTimeString().slice(0,5);
            document.getElementById('categoria').value = ev.categoria || 'altro';
            document.getElementById('prezzo').value = ev.prezzo || 'Gratis';
            impostaCopertinaEsistente(ev.immagine_url || '');
            document.getElementById('descrizione').value = ev.descrizione || '';
            document.getElementById('contatti').value = ev.contatti || '';
            document.getElementById('in_evidenza').checked = !!ev.in_evidenza;

            bottoneSalva.textContent = 'Salva modifiche';
            bottoneAnnulla.style.display = 'block';
            mostraTab('nuovo');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        });
      } catch (err) {
        console.error(err);
        listaAdminEl.innerHTML = '<p class="stato-vuoto">Errore nel caricamento.</p>';
      }
    }
  </script>
</body>
</html>
