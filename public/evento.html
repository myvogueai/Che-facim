<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Evento — Che facim'?</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=11" />
<style>
  .top-bar {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    display: flex; gap: 10px;
  }
  .top-bar button {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(22,19,32,0.65); backdrop-filter: blur(6px);
    display:flex; align-items:center; justify-content:center;
  }
  .top-bar .cuore { margin-left: auto; }
  .top-bar.destra { left:auto; right:16px; }
  .meta-grande { display:flex; gap:18px; margin: 14px 0; flex-wrap: wrap; }
  .meta-grande .voce { display:flex; align-items:center; gap:7px; font-size:14.5px; color: var(--pietra-soft); }
  .sezione-titolo { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--lavanda); margin: 22px 0 8px; font-weight: 700; }
  .descrizione-testo { font-size: 15px; line-height: 1.6; color: var(--pietra-soft); white-space: pre-line; }
  .contatti-box { background: var(--superficie); border-radius: 14px; padding: 16px; margin-top: 10px; }
  .contatti-box a { color: var(--terracotta); font-weight: 600; }
  .blocco-luogo {
    display: flex; align-items: center; gap: 10px;
    width: 100%; min-height: 44px; margin: 0; padding: 4px 0;
    border: none; background: none; text-align: left;
    cursor: pointer; font: inherit; color: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .blocco-luogo:active { opacity: 0.72; }
  .blocco-luogo-pin { flex-shrink: 0; display: flex; }
  .blocco-luogo-testo { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .blocco-luogo-riga1 { color: var(--terracotta); font-weight: 700; font-size: 15px; line-height: 1.3; }
  .blocco-luogo-riga2 { color: var(--lavanda); font-size: 14px; line-height: 1.35; }
  .blocco-luogo-freccia { flex-shrink: 0; display: flex; color: var(--pietra-soft); opacity: 0.75; }
</style>
</head>
<body>

  <div style="position:relative;">
    <div class="top-bar">
      <button onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#faf6ee" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <div class="top-bar destra">
      <button id="bottone-preferito">
        <svg id="icona-cuore" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#faf6ee" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </button>
    </div>
    <div class="dettaglio-hero-wrap">
      <img class="dettaglio-hero" id="img-hero" src="" alt="" />
    </div>
  </div>

  <div class="dettaglio-corpo">
    <span class="filtri-chip-attiva" id="badge-categoria"></span>
    <h1 id="el-titolo" style="margin-top:10px;"></h1>
    <p class="sotto-titolo" id="el-sottotitolo" style="color: var(--lavanda); font-size:15px;"></p>

    <div class="meta-grande">
      <div class="voce" id="meta-data"></div>
      <div class="voce" id="meta-orario"></div>
      <div class="voce" id="meta-prezzo"></div>
    </div>

    <button type="button" class="blocco-luogo" id="blocco-luogo" hidden>
      <span class="blocco-luogo-pin" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--terracotta)" stroke-width="2"><path d="M12 21s7-7.5 7-12a7 7 0 1 0-14 0c0 4.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
      </span>
      <span class="blocco-luogo-testo">
        <span class="blocco-luogo-riga1" id="el-luogo-riga1"></span>
        <span class="blocco-luogo-riga2" id="el-luogo-riga2"></span>
      </span>
      <span class="blocco-luogo-freccia" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
      </span>
    </button>

    <div id="blocco-descrizione" style="display:none;">
      <p class="sezione-titolo">Descrizione</p>
      <p class="descrizione-testo" id="el-descrizione"></p>
    </div>

    <div id="blocco-contatti" style="display:none;">
      <p class="sezione-titolo">Contatti / Info</p>
      <div class="contatti-box">
        <span id="el-contatti"></span>
      </div>
    </div>
  </div>

  <nav class="nav-inferiore">
    <a class="nav-voce" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Esplora
    </a>
    <a class="nav-voce" href="preferiti.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      Preferiti
    </a>
    <a class="nav-voce" href="i-miei-eventi.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      I miei eventi
    </a>
    <a class="nav-voce" href="about.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      About
    </a>
  </nav>

  <script type="module">
    import { db } from './assets/eventi-data.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { aggiungiPreferito, rimuoviPreferito, ePreferito } from './assets/preferiti.js';
    import { parseInputIndirizzo } from './assets/location/indirizzo-parser.js';

    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    const CATEGORIE_LABEL = {
      musica: 'Musica live', sagra: 'Sagra / Festa paesana', nightlife: 'Discoteca / Nightlife',
      teatro: 'Teatro / Cultura', sport: 'Sport', altro: 'Evento'
    };

    function estraiViaCivico(ev) {
      const civicoExtra = (ev.civico || '').trim();
      if (!ev.indirizzo) return '';
      const parsed = parseInputIndirizzo(ev.indirizzo);
      const via = parsed.via.trim();
      if (!via) return '';
      const civico = parsed.civico || civicoExtra || null;
      return civico ? `${via} ${civico}` : via;
    }

    function testoBloccoLuogo(ev) {
      const locale = (ev.locale || '').trim();
      const comune = (ev.comune || '').trim();
      const viaCivico = estraiViaCivico(ev);

      if (locale) {
        const riga2 = viaCivico && comune
          ? `${viaCivico} · ${comune}`
          : comune || viaCivico;
        return { riga1: locale, riga2: riga2 === locale ? '' : riga2 };
      }

      if (viaCivico) {
        return {
          riga1: viaCivico,
          riga2: comune && !viaCivico.includes(comune) ? comune : '',
        };
      }

      return { riga1: comune, riga2: '' };
    }

    function apriInMappe(ev) {
      const lat = Number(ev.lat);
      const lng = Number(ev.lng);
      const haCoord = Number.isFinite(lat) && Number.isFinite(lng);
      const indirizzo = (ev.indirizzo || '').trim();
      const locale = (ev.locale || '').trim();
      const comune = (ev.comune || '').trim();
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

      let url;
      if (haCoord) {
        url = isIOS
          ? `maps://?ll=${lat},${lng}`
          : `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
      } else if (indirizzo) {
        const q = encodeURIComponent(indirizzo);
        url = isIOS
          ? `maps://?q=${q}`
          : `https://www.google.com/maps/search/?api=1&query=${q}`;
      } else {
        const q = encodeURIComponent([locale, comune].filter(Boolean).join(', '));
        url = isIOS
          ? `maps://?q=${q}`
          : `https://www.google.com/maps/search/?api=1&query=${q}`;
      }

      window.location.href = url;
    }

    function impostaBloccoLuogo(ev) {
      const blocco = document.getElementById('blocco-luogo');
      const { riga1, riga2 } = testoBloccoLuogo(ev);
      if (!riga1) {
        blocco.hidden = true;
        return;
      }

      document.getElementById('el-luogo-riga1').textContent = riga1;
      const elRiga2 = document.getElementById('el-luogo-riga2');
      if (riga2) {
        elRiga2.textContent = riga2;
        elRiga2.hidden = false;
      } else {
        elRiga2.textContent = '';
        elRiga2.hidden = true;
      }

      const label = [riga1, riga2].filter(Boolean).join(', ');
      blocco.setAttribute('aria-label', `${label} — apri in mappe`);
      blocco.hidden = false;
      blocco.onclick = () => apriInMappe(ev);
    }

    async function carica() {
      if (!id) { document.body.innerHTML = '<p class="stato-vuoto">Evento non trovato.</p>'; return; }
      const snap = await getDoc(doc(db, 'eventi', id));
      if (!snap.exists()) { document.body.innerHTML = '<p class="stato-vuoto">Evento non trovato.</p>'; return; }
      const ev = snap.data();
      const d = ev.data?.toDate ? ev.data.toDate() : new Date(ev.data);

      document.getElementById('img-hero').src = ev.immagine_url || 'assets/placeholder-evento.jpg';
      document.getElementById('badge-categoria').textContent = CATEGORIE_LABEL[ev.categoria] || 'Evento';
      document.getElementById('el-titolo').textContent = ev.titolo;
      document.getElementById('el-sottotitolo').textContent = ev.sottotitolo || '';
      document.getElementById('meta-data').innerHTML = `📅 ${d.toLocaleDateString('it-IT', { day:'2-digit', month:'long' })}`;
      document.getElementById('meta-orario').innerHTML = `🕐 ${ev.orario}`;
      document.getElementById('meta-prezzo').innerHTML = `💶 ${ev.prezzo || 'Gratis'}`;
      impostaBloccoLuogo(ev);

      if (ev.descrizione) {
        document.getElementById('blocco-descrizione').style.display = 'block';
        document.getElementById('el-descrizione').textContent = ev.descrizione;
      }
      if (ev.contatti) {
        document.getElementById('blocco-contatti').style.display = 'block';
        document.getElementById('el-contatti').textContent = ev.contatti;
      }

      // Stato preferito
      const cuoreIcona = document.getElementById('icona-cuore');
      function aggiornaCuore() {
        const attivo = ePreferito(id);
        cuoreIcona.setAttribute('fill', attivo ? '#e8533a' : 'none');
        cuoreIcona.setAttribute('stroke', attivo ? '#e8533a' : '#faf6ee');
      }
      aggiornaCuore();
      document.getElementById('bottone-preferito').addEventListener('click', () => {
        if (ePreferito(id)) rimuoviPreferito(id);
        else aggiungiPreferito(id, { titolo: ev.titolo, immagine_url: ev.immagine_url, comune: ev.comune, data: ev.data, orario: ev.orario });
        aggiornaCuore();
      });
    }
    carica();
  </script>
</body>
</html>
