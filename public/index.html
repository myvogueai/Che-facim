  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { getEventiPerGiorno, CATEGORIE } from './assets/eventi-data.js';
    import { MappaEsplora } from './assets/mappa-esplora.js?v=6';

    const NOMI_GIORNI = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
    const NOMI_MESI = [
      "Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
      "Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"
    ];
    const contenitoreGiorni = document.getElementById('giorni-scroll');
    const etichettaMeseEl = document.getElementById('giorni-mese');
    const contatoreEl = document.getElementById('contatore-eventi');
    const bottoneFiltra = document.getElementById('bottone-filtra');
    const chipFiltroAttivo = document.getElementById('chip-filtro-attivo');
    const chipFiltroTesto = document.getElementById('chip-filtro-testo');
    const filtriSheet = document.getElementById('filtri-sheet');
    const filtriSheetOpzioni = document.getElementById('filtri-sheet-opzioni');
    const modalMappa = document.getElementById('modal-mappa');
    const bottoneMappaEspandi = document.getElementById('bottone-mappa-espandi');
    const bottoneMappaChiudi = document.getElementById('modal-mappa-chiudi');

    let giornoSelezionato = new Date();
    giornoSelezionato.setHours(0, 0, 0, 0);
    let categoriaAttiva = null;

    let giorni = [];
    let chiaveCalendarioBarra = '';
    let giornoInizio = null;
    let giornoFine = null;
    let estensioneInCorso = false;

    const GIORNI_BUFFER_INIZIALE = { indietro: 45, avanti: 120 };
    const GIORNI_ESTENSIONE = 60;
    const SOGLIA_BORDO_SCROLL = 140;
    const GIORNI_MAX_IN_DOM = 280;
    const RITARDO_FINE_SCROLL_MS = 350;
    const SUPPORTO_SCROLL_END = 'onscrollend' in window;

    let ultimoTsCaricato = null;
    let timerFineScroll = null;
    let scrollRafFocus = 0;
    let scrollProgrammatico = false;

    function oggiMezzanotte() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function clonaGiorno(d) {
      const g = new Date(d);
      g.setHours(0, 0, 0, 0);
      return g;
    }

    function isCambioMese(giorno, giornoPrecedente) {
      if (!giornoPrecedente) return false;
      return giorno.getMonth() !== giornoPrecedente.getMonth()
        || giorno.getFullYear() !== giornoPrecedente.getFullYear();
    }

    function generaIntervalloGiorni(inizio, fine) {
      const lista = [];
      const da = clonaGiorno(inizio);
      const a = clonaGiorno(fine);
      for (let g = da; g <= a; g.setDate(g.getDate() + 1)) {
        lista.push(clonaGiorno(g));
      }
      return lista;
    }

    function inizializzaCarosello(ancora) {
      const centro = clonaGiorno(ancora);
      const inizio = clonaGiorno(centro);
      inizio.setDate(inizio.getDate() - GIORNI_BUFFER_INIZIALE.indietro);
      const fine = clonaGiorno(centro);
      fine.setDate(fine.getDate() + GIORNI_BUFFER_INIZIALE.avanti);
      giorni = generaIntervalloGiorni(inizio, fine);
      giornoInizio = clonaGiorno(giorni[0]);
      giornoFine = clonaGiorno(giorni[giorni.length - 1]);
    }

    function aggiornaEtichettaMese(riferimento) {
      const d = riferimento || giornoSelezionato;
      etichettaMeseEl.textContent = `${NOMI_MESI[d.getMonth()]} ${d.getFullYear()}`.toUpperCase();
    }

    function etichettaCambioMese(giorno, giornoPrecedente) {
      const mese = NOMI_MESI[giorno.getMonth()];
      if (giorno.getFullYear() !== giornoPrecedente.getFullYear()) {
        return `${mese} ${giorno.getFullYear()}`;
      }
      return mese;
    }

    function assicuraGiorniAggiornati() {
      const oggi = oggiMezzanotte();
      const chiave = `${oggi.getFullYear()}-${oggi.getMonth()}-${oggi.getDate()}`;
      const cambiato = chiave !== chiaveCalendarioBarra;
      if (cambiato) {
        const ieri = clonaGiorno(oggi);
        ieri.setDate(ieri.getDate() - 1);
        if (giornoSelezionato.getTime() === ieri.getTime()) {
          giornoSelezionato = clonaGiorno(oggi);
        }
        chiaveCalendarioBarra = chiave;

        if (!giorni.length) {
          inizializzaCarosello(giornoSelezionato);
        } else if (!giorni.some((g) => g.getTime() === giornoSelezionato.getTime())) {
          giornoSelezionato = clonaGiorno(oggi);
          inizializzaCarosello(giornoSelezionato);
        } else {
          if (oggi < giornoInizio) {
            estendiIndietro(Math.ceil((giornoInizio - oggi) / 86400000) + 14);
          } else if (oggi > giornoFine) {
            estendiAvanti(Math.ceil((oggi - giornoFine) / 86400000) + 14);
          }
        }
      }
      aggiornaEtichettaMese(giornoSelezionato);
      return cambiato;
    }

    function formattaOrario(ev) {
      if (ev.orario) return ev.orario;
      const d = ev.data?.toDate ? ev.data.toDate() : new Date(ev.data);
      return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function aggiornaContatore(n) {
      const filtroAttivo = esplora.getCategoriaFiltro();
      const totGiorno = esplora.getEventiGiornoCount();
      if (n === 0 && filtroAttivo && totGiorno > 0) {
        contatoreEl.textContent = 'Nessun evento per il filtro selezionato';
      } else if (n === 0) {
        contatoreEl.textContent = 'Nessun evento per questo giorno';
      } else {
        contatoreEl.textContent = `${n} ${n === 1 ? 'evento' : 'eventi'} in programma`;
      }
    }

    function azzeraFiltroCategoria() {
      categoriaAttiva = null;
      aggiornaChipFiltro();
      esplora.impostaCategoria(null);
    }

    const esplora = new MappaEsplora({
      mappaEl: document.getElementById('mappa'),
      mappaModalEl: document.getElementById('mappa-modal'),
      listaEl: document.getElementById('lista-eventi'),
      caroselloEl: document.getElementById('carosello-mappa'),
      cercaZonaBtn: document.getElementById('bottone-cerca-zona'),
      categorie: CATEGORIE,
      formattaOrario,
      onConteggio: aggiornaContatore,
      onRimuoviFiltroCategoria: azzeraFiltroCategoria,
    });

    esplora.init();

    window.addEventListener('load', () => esplora.ridimensiona());

    function creaPillGiorno(g) {
      const pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'giorno-pill';
      pill.dataset.ts = String(g.getTime());
      pill.style.setProperty('--focus', g.getTime() === giornoSelezionato.getTime() ? '1' : '0');
      pill.innerHTML = `<span class="num">${g.getDate()}</span><span class="label">${NOMI_GIORNI[g.getDay()]}</span>`;
      pill.addEventListener('click', () => {
        giornoSelezionato = clonaGiorno(g);
        aggiornaEtichettaMese(giornoSelezionato);
        scrollProgrammatico = true;
        pill.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
        requestAnimationFrame(() => aggiornaFocusPillScroll());
        schedulaCaricaEventi(giornoSelezionato.getTime());
      });
      return pill;
    }

    function creaNodoGiorno(g, giornoPrecedente) {
      if (isCambioMese(g, giornoPrecedente)) {
        const blocco = document.createElement('div');
        blocco.className = 'giorno-cambio-mese';
        blocco.dataset.ts = String(g.getTime());
        blocco.setAttribute('role', 'presentation');

        const segno = document.createElement('span');
        segno.className = 'giorno-cambio-mese-segno';
        segno.setAttribute('aria-hidden', 'true');
        blocco.appendChild(segno);

        const col = document.createElement('div');
        col.className = 'giorno-cambio-mese-col';

        const etichetta = document.createElement('span');
        etichetta.className = 'giorno-cambio-mese-etichetta';
        etichetta.textContent = etichettaCambioMese(g, giornoPrecedente).toUpperCase();
        col.appendChild(etichetta);
        col.appendChild(creaPillGiorno(g));

        blocco.appendChild(col);
        return blocco;
      }
      return creaPillGiorno(g);
    }

    function trovaNodoGiorno(ts) {
      return contenitoreGiorni.querySelector(`[data-ts="${ts}"]`);
    }

    function aggiornaFocusPillScroll() {
      const pills = contenitoreGiorni.querySelectorAll('.giorno-pill');
      if (!pills.length) return { migliore: null, maxFocus: 0 };

      const containerRect = contenitoreGiorni.getBoundingClientRect();
      const viewportCenter = containerRect.left + containerRect.width / 2;

      let migliore = null;
      let maxFocus = 0;

      pills.forEach((pill) => {
        const rect = pill.getBoundingClientRect();
        const pillCenter = rect.left + rect.width / 2;
        const distanza = Math.abs(pillCenter - viewportCenter);
        const raggio = Math.max(rect.width * 0.92, 48);
        const focus = Math.max(0, Math.min(1, 1 - distanza / raggio));
        pill.style.setProperty('--focus', focus.toFixed(3));

        if (focus > maxFocus) {
          maxFocus = focus;
          migliore = pill;
        }
      });

      return { migliore, maxFocus };
    }

    function schedulaCaricaEventi(ts) {
      if (ultimoTsCaricato === ts) return;
      ultimoTsCaricato = ts;
      caricaEventi();
    }

    function finalizzaScrollCarosello() {
      clearTimeout(timerFineScroll);
      contenitoreGiorni.classList.remove('giorni-scroll-attivo');

      if (scrollProgrammatico) {
        scrollProgrammatico = false;
        aggiornaFocusPillScroll();
        return;
      }

      const { migliore } = aggiornaFocusPillScroll();
      if (!migliore) return;

      const ts = Number(migliore.dataset.ts);
      if (ts === giornoSelezionato.getTime()) return;

      giornoSelezionato = clonaGiorno(new Date(ts));
      aggiornaEtichettaMese(giornoSelezionato);
      schedulaCaricaEventi(ts);
    }

    function scrollGiornoAttivo() {
      const pill = contenitoreGiorni.querySelector(`.giorno-pill[data-ts="${giornoSelezionato.getTime()}"]`);
      if (!pill) return;
      scrollProgrammatico = true;
      pill.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
      requestAnimationFrame(() => aggiornaFocusPillScroll());
    }

    function renderGiorni({ scrollAttivo = true } = {}) {
      assicuraGiorniAggiornati();
      if (!giorni.length) inizializzaCarosello(giornoSelezionato);
      contenitoreGiorni.innerHTML = '';
      giorni.forEach((g, i) => {
        contenitoreGiorni.appendChild(creaNodoGiorno(g, i > 0 ? giorni[i - 1] : null));
      });
      if (scrollAttivo) scrollGiornoAttivo();
      else requestAnimationFrame(() => aggiornaFocusPillScroll());
    }

    function aggiungiNodiInCoda(nuoviGiorni) {
      const fragment = document.createDocumentFragment();
      const indiceBase = giorni.length - nuoviGiorni.length;
      nuoviGiorni.forEach((g, i) => {
        const indice = indiceBase + i;
        const precedente = indice > 0 ? giorni[indice - 1] : null;
        fragment.appendChild(creaNodoGiorno(g, precedente));
      });
      contenitoreGiorni.appendChild(fragment);
    }

    function aggiungiNodiInTesta(nuoviGiorni) {
      const larghezzaPrima = contenitoreGiorni.scrollWidth;
      const fragment = document.createDocumentFragment();
      nuoviGiorni.forEach((g, i) => {
        const precedente = i > 0 ? nuoviGiorni[i - 1] : null;
        fragment.appendChild(creaNodoGiorno(g, precedente));
      });
      contenitoreGiorni.insertBefore(fragment, contenitoreGiorni.firstChild);

      const indiceConfine = nuoviGiorni.length;
      if (indiceConfine < giorni.length && isCambioMese(giorni[indiceConfine], giorni[indiceConfine - 1])) {
        const nodoEsistente = trovaNodoGiorno(giorni[indiceConfine].getTime());
        if (nodoEsistente) {
          nodoEsistente.replaceWith(creaNodoGiorno(giorni[indiceConfine], giorni[indiceConfine - 1]));
        }
      }

      contenitoreGiorni.scrollLeft += contenitoreGiorni.scrollWidth - larghezzaPrima;
    }

    function estendiAvanti(quanti = GIORNI_ESTENSIONE) {
      if (estensioneInCorso || !giornoFine) return;
      estensioneInCorso = true;
      const inizio = clonaGiorno(giornoFine);
      inizio.setDate(inizio.getDate() + 1);
      const fine = clonaGiorno(inizio);
      fine.setDate(fine.getDate() + quanti - 1);
      const nuovi = generaIntervalloGiorni(inizio, fine);
      if (!nuovi.length) {
        estensioneInCorso = false;
        return;
      }
      giorni.push(...nuovi);
      giornoFine = clonaGiorno(nuovi[nuovi.length - 1]);
      aggiungiNodiInCoda(nuovi);
      estensioneInCorso = false;
    }

    function estendiIndietro(quanti = GIORNI_ESTENSIONE) {
      if (estensioneInCorso || !giornoInizio) return;
      estensioneInCorso = true;
      const fine = clonaGiorno(giornoInizio);
      fine.setDate(fine.getDate() - 1);
      const inizio = clonaGiorno(fine);
      inizio.setDate(inizio.getDate() - quanti + 1);
      const nuovi = generaIntervalloGiorni(inizio, fine);
      if (!nuovi.length) {
        estensioneInCorso = false;
        return;
      }
      giorni.unshift(...nuovi);
      giornoInizio = clonaGiorno(nuovi[0]);
      aggiungiNodiInTesta(nuovi);
      estensioneInCorso = false;
    }

    function rimuoviNodiDallInizio(quanti) {
      for (let i = 0; i < quanti; i++) {
        contenitoreGiorni.firstElementChild?.remove();
      }
      const rimossi = giorni.splice(0, quanti);
      const larghezzaDopo = contenitoreGiorni.scrollWidth;
      giornoInizio = clonaGiorno(giorni[0]);
      if (rimossi.length && giorni.length && isCambioMese(giorni[0], rimossi[rimossi.length - 1])) {
        const primo = trovaNodoGiorno(giorni[0].getTime());
        if (primo?.classList.contains('giorno-cambio-mese')) {
          primo.replaceWith(creaPillGiorno(giorni[0]));
        }
      }
      return larghezzaDopo;
    }

    function rimuoviNodiDallaFine(quanti) {
      for (let i = 0; i < quanti; i++) {
        contenitoreGiorni.lastElementChild?.remove();
      }
      giorni.splice(giorni.length - quanti, quanti);
      giornoFine = clonaGiorno(giorni[giorni.length - 1]);
    }

    function compattaDomSeNecessario() {
      const eccesso = giorni.length - GIORNI_MAX_IN_DOM;
      if (eccesso <= 0) return;

      const indiceSelezionato = giorni.findIndex((g) => g.getTime() === giornoSelezionato.getTime());
      if (indiceSelezionato === -1) return;

      const el = contenitoreGiorni;
      const range = el.scrollWidth - el.clientWidth;
      const ratio = range > 0 ? el.scrollLeft / range : 0.5;
      const daRimuovere = Math.min(eccesso, 60);

      if (ratio < 0.35 && indiceSelezionato < giorni.length - daRimuovere) {
        rimuoviNodiDallaFine(daRimuovere);
      } else if (ratio > 0.65 && indiceSelezionato >= daRimuovere) {
        const larghezzaPrima = el.scrollWidth;
        rimuoviNodiDallInizio(daRimuovere);
        el.scrollLeft -= larghezzaPrima - el.scrollWidth;
      }
    }

    let scrollRaf = 0;
    function gestisciScrollCarosello() {
      contenitoreGiorni.classList.add('giorni-scroll-attivo');
      clearTimeout(timerFineScroll);
      timerFineScroll = setTimeout(
        finalizzaScrollCarosello,
        SUPPORTO_SCROLL_END ? 600 : RITARDO_FINE_SCROLL_MS
      );

      if (scrollRafFocus) return;
      scrollRafFocus = requestAnimationFrame(() => {
        scrollRafFocus = 0;
        aggiornaFocusPillScroll();
      });

      if (scrollRaf) return;
      scrollRaf = requestAnimationFrame(() => {
        scrollRaf = 0;
        if (estensioneInCorso) return;

        const el = contenitoreGiorni;
        const { scrollLeft, scrollWidth, clientWidth } = el;
        const distanzaFine = scrollWidth - clientWidth - scrollLeft;

        if (scrollLeft < SOGLIA_BORDO_SCROLL) {
          estendiIndietro();
        } else if (distanzaFine < SOGLIA_BORDO_SCROLL) {
          estendiAvanti();
        }
        compattaDomSeNecessario();
      });
    }

    inizializzaCarosello(giornoSelezionato);
    assicuraGiorniAggiornati();
    renderGiorni();
    requestAnimationFrame(() => aggiornaFocusPillScroll());

    contenitoreGiorni.addEventListener('scroll', gestisciScrollCarosello, { passive: true });
    contenitoreGiorni.addEventListener('scrollend', finalizzaScrollCarosello, { passive: true });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && assicuraGiorniAggiornati()) {
        renderGiorni();
        caricaEventi();
      }
    });
    setInterval(() => {
      if (assicuraGiorniAggiornati()) {
        renderGiorni();
        caricaEventi();
      }
    }, 60_000);

    function renderFiltriSheet() {
      const categoriePresenti = esplora.getCategoriePresenti();
      if (categoriePresenti.length === 0) {
        filtriSheetOpzioni.innerHTML =
          '<p class="filtro-opzione filtro-opzione--vuoto">Nessuna categoria disponibile per questo giorno.</p>';
        return;
      }

      filtriSheetOpzioni.innerHTML = [
        `<button type="button" class="filtro-opzione${!categoriaAttiva ? ' attiva' : ''}" data-cat="">Tutte le categorie</button>`,
        ...categoriePresenti.map(c =>
          `<button type="button" class="filtro-opzione${categoriaAttiva === c.id ? ' attiva' : ''}" data-cat="${c.id}">${c.label}</button>`
        )
      ].join('');

      filtriSheetOpzioni.querySelectorAll('.filtro-opzione[data-cat]').forEach(btn => {
        btn.addEventListener('click', () => {
          categoriaAttiva = btn.dataset.cat || null;
          aggiornaChipFiltro();
          filtriSheet.hidden = true;
          esplora.impostaCategoria(categoriaAttiva);
        });
      });
    }

    function aggiornaChipFiltro() {
      if (!categoriaAttiva) {
        chipFiltroAttivo.hidden = true;
        return;
      }
      const cat = CATEGORIE.find(c => c.id === categoriaAttiva);
      chipFiltroTesto.textContent = cat?.label || categoriaAttiva;
      chipFiltroAttivo.hidden = false;
    }

    bottoneFiltra.addEventListener('click', () => {
      renderFiltriSheet();
      filtriSheet.hidden = !filtriSheet.hidden;
    });

    chipFiltroAttivo.addEventListener('click', () => {
      azzeraFiltroCategoria();
    });

    filtriSheet.addEventListener('click', (e) => {
      if (e.target === filtriSheet) filtriSheet.hidden = true;
    });

    bottoneMappaEspandi.addEventListener('click', () => {
      modalMappa.hidden = false;
      esplora.apriMappaModal();
    });

    bottoneMappaChiudi.addEventListener('click', () => {
      modalMappa.hidden = true;
      esplora.chiudiMappaModal();
    });

    modalMappa.addEventListener('click', (e) => {
      if (e.target === modalMappa) {
        modalMappa.hidden = true;
        esplora.chiudiMappaModal();
      }
    });

    async function caricaEventi() {
      ultimoTsCaricato = giornoSelezionato.getTime();
      const lista = document.getElementById('lista-eventi');
      const carosello = document.getElementById('carosello-mappa');
      lista.innerHTML = '<div class="stato-vuoto stato-vuoto-loading"><p>Caricamento eventi…</p></div>';
      carosello.innerHTML = '<div class="carosello-vuoto carosello-loading"><p>Caricamento eventi…</p></div>';
      contatoreEl.textContent = 'Caricamento eventi…';

      try {
        const eventi = await getEventiPerGiorno(giornoSelezionato);
        esplora.impostaEventi(eventi);
        esplora.ridimensiona();
      } catch (err) {
        console.error(err);
        contatoreEl.textContent = 'Errore nel caricamento';
        lista.innerHTML = '<div class="stato-vuoto"><p>Errore nel caricamento eventi.</p></div>';
        carosello.innerHTML = '<div class="carosello-vuoto"><p>Errore nel caricamento eventi.</p></div>';
      }
    }

    caricaEventi();

    window.addEventListener('resize', () => {
      esplora.ridimensiona();
      aggiornaFocusPillScroll();
    });
  </script>
</body>
</html>
