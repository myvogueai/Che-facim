<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Che facim'? — Eventi in provincia di Potenza</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css" />
</head>
<body class="pagina-esplora">

  <header class="app-header app-header-compatto">
    <div class="header-riga">
      <img src="assets/img/logo-header.png" alt="Che facim'?" class="logo-app logo-app-piccolo" />
      <div>
        <h1>Che facim'?</h1>
        <p class="sotto-titolo" id="contatore-eventi">Caricamento eventi…</p>
      </div>
    </div>
  </header>

  <div class="giorni-scroll" id="giorni-scroll"></div>

  <div class="filtri-bar filtri-bar-compatta">
    <button class="filtri-bottone" id="bottone-filtra" type="button">
      Filtra per categoria
    </button>
    <button class="filtri-chip-attiva" id="chip-filtro-attivo" type="button" hidden>
      <span id="chip-filtro-testo"></span>
      <span aria-hidden="true">×</span>
    </button>
  </div>

  <div class="filtri-sheet" id="filtri-sheet" hidden>
    <div class="filtri-sheet-contenuto" id="filtri-sheet-opzioni"></div>
  </div>

  <main class="esplora-main">
    <div class="mappa-area">
      <button class="cerca-zona-bottone" id="bottone-cerca-zona" type="button" hidden>
        Cerca in questa zona
      </button>
      <div id="mappa"></div>
    </div>

    <div class="carosello-wrap">
      <div class="carosello-eventi" id="carosello-eventi">
        <div class="carosello-vuoto carosello-loading">
          <p>Caricamento eventi…</p>
        </div>
      </div>
    </div>
  </main>

  <nav class="nav-inferiore">
    <a class="nav-voce attiva" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Esplora
    </a>
    <a class="nav-voce" href="preferiti.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      Preferiti
    </a>
    <a class="nav-voce" href="i-miei-eventi.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      I miei eventi
    </a>
    <a class="nav-voce" href="about.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      About
    </a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { getEventiPerGiorno, CATEGORIE } from './assets/eventi-data.js';
    import { MappaEsplora } from './assets/mappa-esplora.js';

    const NOMI_GIORNI = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
    const contenitoreGiorni = document.getElementById('giorni-scroll');
    const contatoreEl = document.getElementById('contatore-eventi');
    const bottoneFiltra = document.getElementById('bottone-filtra');
    const chipFiltroAttivo = document.getElementById('chip-filtro-attivo');
    const chipFiltroTesto = document.getElementById('chip-filtro-testo');
    const filtriSheet = document.getElementById('filtri-sheet');
    const filtriSheetOpzioni = document.getElementById('filtri-sheet-opzioni');

    let giornoSelezionato = new Date();
    giornoSelezionato.setHours(0, 0, 0, 0);
    let categoriaAttiva = null;

    const giorni = [];
    for (let i = 0; i < 14; i++) {
      const g = new Date();
      g.setDate(g.getDate() + i);
      g.setHours(0, 0, 0, 0);
      giorni.push(g);
    }

    function formattaOrario(ev) {
      if (ev.orario) return ev.orario;
      const d = ev.data?.toDate ? ev.data.toDate() : new Date(ev.data);
      return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function aggiornaContatore(stats) {
      const { carosello = 0, mappa = 0, totaliGiorno = 0 } = stats;
      if (totaliGiorno === 0) {
        contatoreEl.textContent = 'Nessun evento per questo giorno';
      } else if (carosello === 0) {
        contatoreEl.textContent = 'Nessun evento con i filtri attivi';
      } else if (mappa === 0) {
        contatoreEl.textContent = `${carosello} ${carosello === 1 ? 'evento' : 'eventi'} · nessuno sulla mappa`;
      } else {
        contatoreEl.textContent = `${mappa} ${mappa === 1 ? 'evento sulla mappa' : 'eventi sulla mappa'}`;
      }
    }

    const esplora = new MappaEsplora({
      mappaEl: document.getElementById('mappa'),
      caroselloEl: document.getElementById('carosello-eventi'),
      cercaZonaBtn: document.getElementById('bottone-cerca-zona'),
      formattaOrario,
      onConteggio: aggiornaContatore,
    });

    esplora.init();

    window.addEventListener('load', () => esplora.ridimensiona());

    function renderGiorni() {
      contenitoreGiorni.innerHTML = '';
      giorni.forEach(g => {
        const attivo = g.getTime() === giornoSelezionato.getTime();
        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'giorno-pill' + (attivo ? ' attivo' : '');
        pill.innerHTML = `<span class="num">${g.getDate()}</span><span class="label">${NOMI_GIORNI[g.getDay()]}</span>`;
        pill.addEventListener('click', () => {
          giornoSelezionato = g;
          renderGiorni();
          caricaEventi();
        });
        contenitoreGiorni.appendChild(pill);
      });

      const attivoEl = contenitoreGiorni.querySelector('.giorno-pill.attivo');
      attivoEl?.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
    }
    renderGiorni();

    function renderFiltriSheet() {
      filtriSheetOpzioni.innerHTML = [
        `<button type="button" class="filtro-opzione${!categoriaAttiva ? ' attiva' : ''}" data-cat="">Tutte le categorie</button>`,
        ...CATEGORIE.map(c =>
          `<button type="button" class="filtro-opzione${categoriaAttiva === c.id ? ' attiva' : ''}" data-cat="${c.id}">${c.label}</button>`
        )
      ].join('');

      filtriSheetOpzioni.querySelectorAll('.filtro-opzione').forEach(btn => {
        btn.addEventListener('click', () => {
          categoriaAttiva = btn.dataset.cat || null;
          aggiornaChipFiltro();
          filtriSheet.hidden = true;
          esplora.impostaCategoria(categoriaAttiva);
        });
      });
    }

    function aggiornaChipFiltro() {
      if (!categoriaAttiva) {
        chipFiltroAttivo.hidden = true;
        return;
      }
      const cat = CATEGORIE.find(c => c.id === categoriaAttiva);
      chipFiltroTesto.textContent = cat?.label || categoriaAttiva;
      chipFiltroAttivo.hidden = false;
    }

    bottoneFiltra.addEventListener('click', () => {
      renderFiltriSheet();
      filtriSheet.hidden = !filtriSheet.hidden;
    });

    chipFiltroAttivo.addEventListener('click', () => {
      categoriaAttiva = null;
      aggiornaChipFiltro();
      esplora.impostaCategoria(null);
    });

    filtriSheet.addEventListener('click', (e) => {
      if (e.target === filtriSheet) filtriSheet.hidden = true;
    });

    async function caricaEventi() {
      document.getElementById('carosello-eventi').innerHTML =
        '<div class="carosello-vuoto carosello-loading"><p>Caricamento eventi…</p></div>';
      contatoreEl.textContent = 'Caricamento eventi…';

      try {
        const eventi = await getEventiPerGiorno(giornoSelezionato);
        esplora.impostaEventi(eventi);
        esplora.ridimensiona();
      } catch (err) {
        console.error(err);
        contatoreEl.textContent = 'Errore nel caricamento';
        document.getElementById('carosello-eventi').innerHTML =
          '<div class="carosello-vuoto"><p>Errore nel caricamento eventi.</p></div>';
      }
    }

    caricaEventi();

    window.addEventListener('resize', () => esplora.ridimensiona());
  </script>
</body>
</html>
