<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Che facim'? — Eventi in provincia di Potenza</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css" />
<style>
  #mappa-wrap { position: relative; }
  .leaflet-container { background: var(--superficie) !important; }
  .leaflet-control-attribution { background: rgba(22,19,32,0.7) !important; color: var(--lavanda) !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: var(--lavanda) !important; }
</style>
</head>
<body>

  <header class="app-header">
    <div class="header-riga">
      <img src="assets/img/logo-header.png" alt="Che facim'?" class="logo-app" />
      <div>
        <h1>Che facim'?</h1>
        <p class="sotto-titolo" id="contatore-eventi">Caricamento eventi…</p>
      </div>
    </div>
  </header>

  <div class="giorni-scroll" id="giorni-scroll"></div>

  <div class="filtri-bar">
    <button class="filtri-bottone" id="bottone-filtra">
      Filtra per categoria
    </button>
  </div>

  <div class="lista-eventi" id="lista-eventi">
    <div class="skeleton-card"><div class="skel-img"></div><div class="skel-riga"></div><div class="skel-riga corta"></div></div>
    <div class="skeleton-card"><div class="skel-img"></div><div class="skel-riga"></div><div class="skel-riga corta"></div></div>
  </div>

  <button class="bottone-mappa-flottante" id="bottone-apri-mappa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/><path d="M9 7v13M15 4v13"/></svg>
    Mappa
  </button>

  <div class="modal-mappa" id="modal-mappa">
    <div class="modal-mappa-header">
      <h2>Eventi sulla mappa</h2>
      <button class="modal-mappa-chiudi" id="bottone-chiudi-mappa">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#faf6ee" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="modal-mappa-corpo">
      <button class="cerca-zona-bottone" id="bottone-cerca-zona" style="display:none;">Cerca in questa zona</button>
      <div id="mappa"></div>
    </div>
  </div>

  <nav class="nav-inferiore">
    <a class="nav-voce attiva" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Esplora
    </a>
    <a class="nav-voce" href="preferiti.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      Preferiti
    </a>
    <a class="nav-voce" href="i-miei-eventi.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      I miei eventi
    </a>
    <a class="nav-voce" href="about.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      About
    </a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { getEventiPerGiorno, CATEGORIE } from './assets/eventi-data.js';

    // ---- Costruzione selettore giorni (oggi + prossimi 13 giorni) ----
    const NOMI_GIORNI = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
    const contenitoreGiorni = document.getElementById('giorni-scroll');
    let giornoSelezionato = new Date();
    giornoSelezionato.setHours(0,0,0,0);

    const giorni = [];
    for (let i = 0; i < 14; i++) {
      const g = new Date();
      g.setDate(g.getDate() + i);
      g.setHours(0,0,0,0);
      giorni.push(g);
    }

    function renderGiorni() {
      contenitoreGiorni.innerHTML = '';
      giorni.forEach(g => {
        const attivo = g.getTime() === giornoSelezionato.getTime();
        const pill = document.createElement('button');
        pill.className = 'giorno-pill' + (attivo ? ' attivo' : '');
        pill.innerHTML = `<span class="num">${g.getDate()}</span><span class="label">${NOMI_GIORNI[g.getDay()]}</span>`;
        pill.addEventListener('click', () => {
          giornoSelezionato = g;
          renderGiorni();
          caricaEventi();
        });
        contenitoreGiorni.appendChild(pill);
      });
    }
    renderGiorni();

    // ---- Modal mappa: Leaflet si inizializza solo alla prima apertura ----
    const modalMappa = document.getElementById('modal-mappa');
    const bottoneApriMappa = document.getElementById('bottone-apri-mappa');
    const bottoneChiudiMappa = document.getElementById('bottone-chiudi-mappa');
    const CENTRO_POTENZA = [40.6404, 15.8056];

    let mappa = null;
    let marcatori = [];
    let ultimiEventiCaricati = [];

    function inizializzaMappaSeNecessario() {
      if (mappa) return;
      mappa = L.map('mappa', { zoomControl: false, attributionControl: true }).setView(CENTRO_POTENZA, 9);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap, © CARTO', maxZoom: 19
      }).addTo(mappa);
    }

    bottoneApriMappa.addEventListener('click', () => {
      modalMappa.classList.add('aperta');
      inizializzaMappaSeNecessario();
      // Leaflet ha bisogno di ricalcolare le dimensioni dopo essere diventato visibile
      setTimeout(() => {
        mappa.invalidateSize();
        disegnaMarcatori(ultimiEventiCaricati);
        if (ultimiEventiCaricati.length > 0) {
          const bounds = L.latLngBounds(ultimiEventiCaricati.filter(e => e.lat && e.lng).map(e => [e.lat, e.lng]));
          if (bounds.isValid()) mappa.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
        }
      }, 50);
    });
    bottoneChiudiMappa.addEventListener('click', () => modalMappa.classList.remove('aperta'));

    function pinIcona(attivo) {
      return L.divIcon({
        className: '',
        html: `<div class="pin-fuoco${attivo ? ' attivo' : ''}"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
    }

    function disegnaMarcatori(eventi) {
      if (!mappa) return;
      marcatori.forEach(m => mappa.removeLayer(m));
      marcatori = [];
      eventi.forEach(ev => {
        if (!ev.lat || !ev.lng) return;
        const marker = L.marker([ev.lat, ev.lng], { icon: pinIcona(false) })
          .addTo(mappa)
          .on('click', () => {
            modalMappa.classList.remove('aperta');
            const card = document.getElementById('card-' + ev.id);
            if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        marcatori.push(marker);
      });
    }

    // ---- Caricamento e render eventi ----
    const listaEl = document.getElementById('lista-eventi');
    const contatoreEl = document.getElementById('contatore-eventi');

    const ICONE_META = {
      orologio: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
      pin: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-7.5 7-12a7 7 0 1 0-14 0c0 4.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>',
      euro: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 7a5 5 0 0 0-8 4 5 5 0 0 0 8 4M5 10h7M5 14h6"/></svg>'
    };

    const FRECCIA_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#faf6ee" stroke-width="2.4"><path d="M9 18l6-6-6-6"/></svg>';

    function formattaOrario(ev) {
      if (ev.orario) return ev.orario;
      const d = ev.data?.toDate ? ev.data.toDate() : new Date(ev.data);
      return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function renderEventi(eventi) {
      if (eventi.length === 0) {
        listaEl.innerHTML = `<p class="stato-vuoto">Nessun evento trovato per questo giorno.<br>Prova a scorrere su un'altra data, o torna a controllare più tardi — la lista si riempie ogni settimana.</p>`;
        contatoreEl.textContent = 'Nessun evento per oggi';
        return;
      }
      contatoreEl.textContent = `${eventi.length} ${eventi.length === 1 ? 'evento trovato' : 'eventi trovati'}`;
      listaEl.innerHTML = eventi.map((ev, i) => {
        const prezzoGratis = (ev.prezzo || '').toLowerCase().includes('gratis') || (ev.prezzo || '').toLowerCase().includes('gratuit');
        return `
        <a class="evento-card cat-${ev.categoria || 'altro'}${ev.in_evidenza ? ' in-evidenza' : ''}" id="card-${ev.id}" href="evento.html?id=${ev.id}" style="animation-delay:${i * 0.05}s">
          ${ev.in_evidenza ? '<span class="badge-evidenza">In evidenza</span>' : ''}
          <img class="locandina" src="${ev.immagine_url || 'assets/placeholder-evento.jpg'}" alt="" loading="lazy" />
          <div class="corpo">
            <div class="titolo-riga">
              <div>
                <div class="titolo">${ev.titolo}</div>
                ${ev.sottotitolo ? `<div class="sottotitolo">${ev.sottotitolo}</div>` : ''}
              </div>
              <div class="freccia">${FRECCIA_SVG}</div>
            </div>
            <div class="locale">${ev.locale}</div>
            <div class="meta-riga">
              <span>${ICONE_META.orologio} ${formattaOrario(ev)}</span>
              <span>${ICONE_META.pin} ${ev.comune}</span>
            </div>
            <div class="prezzo-riga${prezzoGratis ? ' gratis' : ''}">${ICONE_META.euro} ${ev.prezzo || 'Gratis'}</div>
          </div>
        </a>`;
      }).join('');
    }

    async function caricaEventi() {
      listaEl.innerHTML = `
        <div class="skeleton-card"><div class="skel-img"></div><div class="skel-riga"></div><div class="skel-riga corta"></div></div>
        <div class="skeleton-card"><div class="skel-img"></div><div class="skel-riga"></div><div class="skel-riga corta"></div></div>`;
      try {
        const eventi = await getEventiPerGiorno(giornoSelezionato);
        ultimiEventiCaricati = eventi;
        renderEventi(eventi);
        if (mappa) disegnaMarcatori(eventi);
      } catch (err) {
        console.error(err);
        listaEl.innerHTML = `<p class="stato-vuoto">Errore nel caricamento eventi.<br>Controlla la configurazione Firebase in assets/firebase-config.js</p>`;
      }
    }

    caricaEventi();
  </script>
</body>
</html>
