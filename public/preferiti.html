<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Preferiti — Che facim'?</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-riga">
      <img src="assets/img/logo-header.png" alt="Che facim'?" class="logo-app" />
      <div>
        <h1>Preferiti</h1>
        <p class="sotto-titolo">Gli eventi che hai salvato</p>
      </div>
    </div>
  </header>

  <div class="lista-eventi" id="lista-preferiti"></div>

  <nav class="nav-inferiore">
    <a class="nav-voce" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Esplora
    </a>
    <a class="nav-voce attiva" href="preferiti.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      Preferiti
    </a>
    <a class="nav-voce" href="i-miei-eventi.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      I miei eventi
    </a>
    <a class="nav-voce" href="about.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      About
    </a>
  </nav>

  <script type="module">
    import { getPreferiti } from './assets/preferiti.js';

    const lista = getPreferiti().sort((a, b) => b.salvato_il - a.salvato_il);
    const el = document.getElementById('lista-preferiti');

    if (lista.length === 0) {
      el.innerHTML = `<p class="stato-vuoto">Non hai ancora salvato eventi.<br>Tocca il cuore ♡ sulla pagina di un evento per ritrovarlo qui.</p>`;
    } else {
      el.innerHTML = lista.map(ev => {
        const d = ev.data?.seconds ? new Date(ev.data.seconds * 1000) : new Date();
        return `
        <a class="evento-card" href="evento.html?id=${ev.id}">
          <img class="locandina" src="${ev.immagine_url || 'assets/placeholder-evento.jpg'}" alt="" loading="lazy" />
          <div class="corpo">
            <div class="titolo">${ev.titolo}</div>
            <div class="meta-riga">
              <span>📅 ${d.toLocaleDateString('it-IT', { day:'2-digit', month:'short' })}</span>
              <span>📍 ${ev.comune || ''}</span>
            </div>
          </div>
        </a>`;
      }).join('');
    }
  </script>
</body>
</html>
